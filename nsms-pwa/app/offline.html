<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSMS — Offline</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:#eceaf8;color:#1c2620;text-align:center;padding:24px;box-sizing:border-box;}
  .card{max-width:360px;}
  .ico{width:64px;height:64px;border-radius:16px;background:#0b3d91;margin:0 auto 18px;
       display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:800;}
  h1{font-size:18px;margin:0 0 8px;}
  p{font-size:13.5px;color:#5d6b62;line-height:1.5;margin:0 0 20px;}
  button{background:#0b3d91;color:#fff;border:none;border-radius:9px;padding:11px 22px;
         font-size:14px;font-weight:700;cursor:pointer;}
  button:hover{background:#082a66;}
</style>
</head>
<body>
  <div class="card">
    <div class="ico">N</div>
    <h1>You're offline</h1>
    <p>NSMS couldn't reach the server. Any dashboard or entries data you've viewed recently may still be
       available once the app loads — and new entries you submit now will be queued and sent automatically
       once you're back online.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
